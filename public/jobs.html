<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs - Campus Micro Placement</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header class="top-bar">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </header>

    <main>
      <section id="suggestionsSection" class="suggestions-section hidden">
        <h1>Suggested Jobs For You</h1>
        <p id="suggestionsMessage" class="message"></p>
        <section id="suggestedJobsList" class="jobs-grid"></section>
      </section>

      <h1>Available Jobs</h1>
      <section class="card filters-card">
        <label for="domainFilter">Domain</label>
        <input type="text" id="domainFilter" placeholder="e.g. Web Development" />

        <label for="campusFilter">Campus</label>
        <input type="text" id="campusFilter" placeholder="e.g. Main Campus" />

        <button id="applyFiltersBtn" type="button">Apply Filters</button>
      </section>
      <p id="jobsMessage" class="message"></p>
      <section id="jobsList" class="jobs-grid"></section>
    </main>
  </div>

  <script src="js/main.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Available Jobs</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #0b5f59;
      --border: #e5e7eb;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(145deg, #f8fafc, #ecfeff);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1100px, 92%);
      margin: 36px auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.5vw, 2rem);
    }

    .subtext {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .message {
      color: var(--danger);
      font-weight: 600;
      margin-bottom: 16px;
      min-height: 24px;
    }

    .job-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .job-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .job-title {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.3;
    }

    .meta {
      font-size: 0.92rem;
      color: var(--muted);
      margin: 0;
    }

    .description {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .apply-btn {
      margin-top: auto;
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .apply-btn:hover {
      background: var(--primary-hover);
    }

    .empty {
      color: var(--muted);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Available Jobs</h1>
    <p class="subtext">Browse open opportunities and apply directly.</p>
    <p id="message" class="message" aria-live="polite"></p>
    <section id="jobGrid" class="job-grid"></section>
  </main>

  <script>
    const jobGrid = document.getElementById('jobGrid');
    const message = document.getElementById('message');

    const formatDate = (value) => {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 'N/A';
      return date.toLocaleDateString();
    };

    const createJobCard = (job) => {
      const article = document.createElement('article');
      article.className = 'job-card';

      const companyName = job.postedBy?.companyName || 'Unknown company';

      article.innerHTML = `
        <h2 class="job-title">${job.title || 'Untitled Job'}</h2>
        <p class="meta"><strong>Company:</strong> ${companyName}</p>
        <p class="meta"><strong>Stipend:</strong> ${job.stipend ?? 'N/A'}</p>
        <p class="meta"><strong>Deadline:</strong> ${formatDate(job.deadline)}</p>
        <p class="description">${job.description || ''}</p>
        <button class="apply-btn" type="button">Apply</button>
      `;

      const button = article.querySelector('.apply-btn');
      button.addEventListener('click', () => {
        alert(`Applied for: ${job.title || 'job'}`);
      });

      return article;
    };

    const loadJobs = async () => {
      message.textContent = '';
      try {
        const response = await fetch('/api/jobs');
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Failed to fetch jobs');
        }

        const jobs = Array.isArray(data.jobs) ? data.jobs : [];

        if (jobs.length === 0) {
          jobGrid.innerHTML = '<p class="empty">No jobs available right now.</p>';
          return;
        }

        jobGrid.innerHTML = '';
        jobs.forEach((job) => {
          jobGrid.appendChild(createJobCard(job));
        });
      } catch (error) {
        message.textContent = error.message || 'Something went wrong while loading jobs';
      }
    };

    loadJobs();
  </script>
</body>
</html>

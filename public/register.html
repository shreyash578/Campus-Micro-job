<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #0d5f59;
      --border: #d1d5db;
      --danger: #b91c1c;
      --success: #166534;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #eef2ff, #e6fffa);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .form-card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    .subtitle { margin: 0 0 20px; color: var(--muted); font-size: 0.95rem; }
    .field { margin-bottom: 14px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    button {
      width: 100%;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 6px;
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.7; cursor: not-allowed; }

    .message {
      margin-top: 14px;
      font-size: 0.92rem;
      font-weight: 600;
      min-height: 22px;
    }

    .message.error { color: var(--danger); }
    .message.success { color: var(--success); }

    @media (max-width: 520px) {
      .form-card { padding: 18px; border-radius: 12px; }
      h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <main class="form-card">
    <h1>Student Registration</h1>
    <p class="subtitle">Create your account to apply for campus microjobs.</p>

    <form id="registerForm" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required minlength="2" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="6" />
      </div>

      <div class="field">
        <label for="contactNumber">Contact Number</label>
        <input id="contactNumber" name="contactNumber" type="tel" required />
      </div>

      <div class="field">
        <label for="resumeLink">Resume Link</label>
        <input id="resumeLink" name="resumeLink" type="url" required placeholder="https://example.com/resume.pdf" />
      </div>

      <button id="submitBtn" type="submit">Register</button>
      <p id="formMessage" class="message" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const formMessage = document.getElementById('formMessage');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      formMessage.textContent = '';
      formMessage.className = 'message';

      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());

      submitBtn.disabled = true;
      submitBtn.textContent = 'Registering...';

      try {
        const response = await fetch('/api/students/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Registration failed');
        }

        formMessage.textContent = data.message || 'Registration successful';
        formMessage.classList.add('success');
        form.reset();
      } catch (error) {
        formMessage.textContent = error.message || 'Something went wrong';
        formMessage.classList.add('error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Register';
      }
    });
  </script>
</body>
</html>

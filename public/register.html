<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration - Campus Micro Placement</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header class="top-bar">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="jobs.html">Jobs</a>
    </header>

    <main class="card form-card">
      <h1>Student Registration</h1>

      <form id="registerForm">
        <label for="campus">Campus</label>
        <input type="text" id="campus" name="campus" required placeholder="Main Campus" />

        <label for="preferredDomains">Preferred Domains (comma separated)</label>
        <input type="text" id="preferredDomains" name="preferredDomains" placeholder="Web Development, Data Science, AI" />

        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />

        <label for="contactNumber">Contact Number</label>
        <input type="text" id="contactNumber" name="contactNumber" required />

        <label for="resumeLink">Resume Link</label>
        <input type="url" id="resumeLink" name="resumeLink" required placeholder="https://example.com/resume.pdf" />

        <button type="submit">Register</button>
      </form>

      <p id="registerMessage" class="message"></p>
    </main>
  </div>

  <script src="js/main.js" defer></script>
</body>
</html>
